<script>
/* ═══════════════════════════════════════
   STORAGE — FIXED VERSION
═══════════════════════════════════════ */

const GH_USER  = 'jotracks';
const GH_REPO  = 'INGUZ';
const GH_FILE  = 'data.json'; // 👈 FIX IMPORTANTE
const GH_TOKEN_KEY = 'inguz_gh_token';

let GH_TOKEN = localStorage.getItem(GH_TOKEN_KEY) || '';

const GH_API = `https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/${GH_FILE}`;

let ghSha = null;
let syncPending = false;
let syncTimer = null;

/* ===== SAVE ===== */
function saveData(data) {
  localStorage.setItem('inguz_data', JSON.stringify(data));

  // 👇 FIX: no sync si no hay token
  if (!GH_TOKEN || GH_TOKEN === 'offline') return;

  clearTimeout(syncTimer);
  syncTimer = setTimeout(() => pushToGitHub(data), 1200);
}

/* ===== PUSH ===== */
async function pushToGitHub(data) {
  if (!GH_TOKEN || GH_TOKEN === 'offline') return;
  if (syncPending) return;

  syncPending = true;

  try {
    // obtener SHA si existe
    if (!ghSha) {
      const res = await fetch(GH_API, {
        headers: {
          'Authorization': `token ${GH_TOKEN}`,
          'Accept': 'application/vnd.github.v3+json'
        }
      });

      if (res.ok) {
        const json = await res.json();
        ghSha = json.sha;
      }
    }

    const cleanData = JSON.parse(JSON.stringify(data));
    if (cleanData.perfil) cleanData.perfil.foto = '';

    const body = {
      message: `update ${new Date().toISOString()}`,
      content: btoa(unescape(encodeURIComponent(JSON.stringify(cleanData, null, 2))))
    };

    if (ghSha) body.sha = ghSha;

    const res = await fetch(GH_API, {
      method: 'PUT',
      headers: {
        'Authorization': `token ${GH_TOKEN}`,
        'Content-Type': 'application/json',
        'Accept': 'application/vnd.github.v3+json'
      },
      body: JSON.stringify(body)
    });

    if (!res.ok) {
      console.error(await res.text());
      showSyncDot('err');
      return;
    }

    const json = await res.json();
    ghSha = json.content.sha;

    showSyncDot('ok');

  } catch (e) {
    console.error(e);
    showSyncDot('err');
  }

  syncPending = false;
}

/* ===== PULL ===== */
async function pullFromGitHub() {
  if (!GH_TOKEN || GH_TOKEN === 'offline') return false;

  try {
    const res = await fetch(GH_API + '?t=' + Date.now(), {
      headers: {
        'Authorization': `token ${GH_TOKEN}`,
        'Accept': 'application/vnd.github.v3+json'
      }
    });

    if (!res.ok) return false;

    const json = await res.json();
    ghSha = json.sha;

    const decoded = decodeURIComponent(escape(atob(json.content.replace(/\n/g,''))));
    const remoteData = JSON.parse(decoded);

    localStorage.setItem('inguz_data', JSON.stringify(remoteData));

    showSyncDot('ok');
    return true;

  } catch (e) {
    console.error(e);
    return false;
  }
}

/* ═══════════════════════════════════════
   SETUP TOKEN — FIXED
═══════════════════════════════════════ */

async function guardarToken() {
  const inp = document.getElementById('setup-token-inp');
  const token = inp.value.trim();
  const err = document.getElementById('setup-err');

  err.style.display = 'none';

  if (!token.startsWith('ghp_') && !token.startsWith('github_pat_')) {
    err.textContent = 'Token inválido';
    err.style.display = 'block';
    return;
  }

  try {
    const res = await fetch(GH_API, {
      headers: {
        'Authorization': `token ${token}`,
        'Accept': 'application/vnd.github.v3+json'
      }
    });

    if (res.status === 401 || res.status === 403) {
      err.textContent = 'Token sin permisos. Necesita Contents: Read & Write';
      err.style.display = 'block';
      return;
    }

  } catch (e) {
    err.textContent = 'Error de conexión';
    err.style.display = 'block';
    return;
  }

  localStorage.setItem(GH_TOKEN_KEY, token);
  GH_TOKEN = token;

  iniciarApp();
}

/* ===== RESET FIX ===== */
function resetApp() {
  if (confirm('Se borra TODO')) {
    localStorage.removeItem('inguz_data');
    localStorage.removeItem(GH_TOKEN_KEY);
    location.reload();
  }
}
</script>
