<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>INGUZ App</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f1115;
  color: white;
}

/* pantallas */
.screen { display: none; padding: 20px; }
.screen.active { display: block; }

/* setup */
input {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 6px;
  border: none;
}

button {
  margin-top: 15px;
  padding: 12px;
  width: 100%;
  background: #00ff88;
  border: none;
  font-weight: bold;
  cursor: pointer;
}

/* debug */
pre {
  background: #111;
  padding: 10px;
  border-radius: 6px;
}
</style>
</head>

<body>

<!-- SETUP -->
<div id="screen-setup" class="screen">
  <h2>Conectar con GitHub</h2>

  <input id="setup-token-inp" type="password" placeholder="github_pat_..." />
  <div id="setup-err" style="display:none;color:red;margin-top:10px;"></div>

  <button onclick="guardarToken()">Entrar</button>
</div>

<!-- HOME -->
<div id="screen-home" class="screen">
  <h1>INGUZ</h1>

  <button onclick="agregarDato()">Agregar dato de prueba</button>
  <button onclick="resetApp()">Reset</button>

  <h3>DATA:</h3>
  <pre id="debug"></pre>
</div>

<script>
/* ============================
   CONFIG
============================ */
const GH_USER  = 'jotracks';
const GH_REPO  = 'INGUZ';
const GH_FILE  = 'data.json';
const GH_TOKEN_KEY = 'inguz_gh_token';

let GH_TOKEN = localStorage.getItem(GH_TOKEN_KEY) || '';
const GH_API = `https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/${GH_FILE}`;

let ghSha = null;
let syncPending = false;
let syncTimer = null;

/* ============================
   DATA LOCAL
============================ */
function getData() {
  try {
    return JSON.parse(localStorage.getItem('inguz_data') || '{}');
  } catch(e) {
    return {};
  }
}

function saveData(data) {
  localStorage.setItem('inguz_data', JSON.stringify(data));
  render();

  if (!GH_TOKEN) return;

  clearTimeout(syncTimer);
  syncTimer = setTimeout(() => pushToGitHub(data), 1000);
}

/* ============================
   PUSH GITHUB
============================ */
async function pushToGitHub(data) {
  if (!GH_TOKEN || syncPending) return;

  syncPending = true;

  try {
    if (!ghSha) {
      const res = await fetch(GH_API, {
        headers: { Authorization: `token ${GH_TOKEN}` }
      });

      if (res.ok) {
        const json = await res.json();
        ghSha = json.sha;
      }
    }

    const body = {
      message: 'update',
      content: btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2))))
    };

    if (ghSha) body.sha = ghSha;

    const res = await fetch(GH_API, {
      method: 'PUT',
      headers: {
        Authorization: `token ${GH_TOKEN}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(body)
    });

    if (!res.ok) {
      console.error(await res.text());
    } else {
      const json = await res.json();
      ghSha = json.content.sha;
    }

  } catch (e) {
    console.error(e);
  }

  syncPending = false;
}

/* ============================
   PULL
============================ */
async function pullFromGitHub() {
  if (!GH_TOKEN) return;

  try {
    const res = await fetch(GH_API);

    if (!res.ok) return;

    const json = await res.json();
    ghSha = json.sha;

    const decoded = decodeURIComponent(escape(atob(json.content)));
    const remote = JSON.parse(decoded);

    localStorage.setItem('inguz_data', JSON.stringify(remote));
    render();

  } catch (e) {
    console.error(e);
  }
}

/* ============================
   TOKEN
============================ */
function guardarToken() {
  const token = document.getElementById('setup-token-inp').value.trim();
  const err = document.getElementById('setup-err');

  if (!token) {
    err.textContent = 'Pegá un token';
    err.style.display = 'block';
    return;
  }

  localStorage.setItem(GH_TOKEN_KEY, token);
  GH_TOKEN = token;

  document.getElementById('screen-setup').classList.remove('active');
  document.getElementById('screen-home').classList.add('active');

  pullFromGitHub();
}

/* ============================
   APP
============================ */
function agregarDato() {
  const d = getData();

  if (!d.historial) d.historial = [];

  d.historial.push({
    fecha: new Date().toISOString(),
    valor: Math.floor(Math.random() * 100)
  });

  saveData(d);
}

function render() {
  document.getElementById('debug').textContent =
    JSON.stringify(getData(), null, 2);
}

function resetApp() {
  localStorage.clear();
  location.reload();
}

/* ============================
   INIT
============================ */
document.addEventListener('DOMContentLoaded', () => {
  const token = localStorage.getItem(GH_TOKEN_KEY);

  if (!token) {
    document.getElementById('screen-setup').classList.add('active');
  } else {
    GH_TOKEN = token;
    document.getElementById('screen-home').classList.add('active');
    pullFromGitHub();
  }

  render();
});
</script>

</body>
</html>
